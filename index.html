<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Radar · LLM Serving & Efficiency</title>
  <meta name="description" content="每日自动更新的 LLM 推理服务与高效化前沿论文追踪" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand">
        <span class="logo">📡</span>
        <div>
          <h1>Paper Radar</h1>
          <p class="tagline">LLM Serving &amp; Inference Efficiency · 每日自动更新</p>
        </div>
      </div>
      <div class="header-meta">
        <span class="updated" id="updated">加载中…</span>
        <a class="gh-link" id="sourceLink" href="https://arxiv.org" target="_blank" rel="noopener">arXiv 数据源</a>
      </div>
    </div>
  </header>

  <main class="wrap">
    <nav class="view-tabs" aria-label="视图切换">
      <button class="vtab active" data-view="latest">最新</button>
      <button class="vtab" data-view="archive">历史归档</button>
    </nav>

    <section class="controls">
      <div class="search-box">
        <svg viewBox="0 0 24 24" class="search-icon" aria-hidden="true"><path d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="search" id="search" placeholder="搜索标题、作者、摘要关键词…" autocomplete="off" />
      </div>
      <div class="controls-right">
        <label class="sort-box">
          <span>排序</span>
          <select id="sort">
            <option value="date">最新</option>
            <option value="quality">质量</option>
          </select>
        </label>
        <div class="stats" id="stats"></div>
      </div>
    </section>

    <nav class="topics" id="topics" aria-label="主题筛选"></nav>

    <section id="papers" class="papers"></section>

    <div id="empty" class="empty hidden">
      <p>没有匹配的论文，试试其他关键词或主题。</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>数据来自 <a href="https://arxiv.org" target="_blank" rel="noopener">arXiv</a> · 每日通过 GitHub Actions 自动抓取更新 · Paper Radar</p>
    </div>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
