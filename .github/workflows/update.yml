name: Update papers & deploy

on:
  schedule:
    # Runs daily at 01:00 UTC (09:00 Beijing time). Cron uses UTC.
    - cron: "0 1 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Add repo secret CURSOR_API_KEY to enable LLM (codex) quality review via
      # the Cursor SDK. Leave it unset and the script uses the offline
      # heuristic score — no extra dependency is installed in that case.
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install LLM dependencies
        # Only needed for LLM review; skipped entirely (saving a ~45MB download)
        # when CURSOR_API_KEY is not configured.
        if: ${{ env.CURSOR_API_KEY != '' }}
        run: pip install -r requirements.txt

      - name: Fetch latest papers from arXiv
        run: python fetch_papers.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/papers.json data/archive.json
          if git diff --staged --quiet; then
            echo "No changes to data"
          else
            git commit -m "chore: daily paper update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
